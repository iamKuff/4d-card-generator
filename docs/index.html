<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4D Card Generator</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at 50% 20%, #1a1a3a 0%, #0b0d18 55%);
      color: #e8e8ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem;
      box-sizing: border-box;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.35rem; }
    .sub { color: #98a0c0; font-size: 0.95rem; text-align: center; max-width: 28rem; margin: 0 0 1rem; }
    iframe {
      width: min(520px, 100%);
      height: min(72vh, 640px);
      border: none;
      border-radius: 12px;
      background: #0b0d18;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }
    nav { margin-top: 1rem; font-size: 0.9rem; }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <h1>4D Card Generator</h1>
  <p class="sub">Move the pointer — each PNG is a separate layer (not one flat image).</p>
  <iframe src="./demo/viewer.html" title="Layered card viewer"></iframe>
  <nav>
    <a href="./demo/viewer.html">Full-page viewer</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/iamKuff/4d-card-generator">GitHub</a>
  </nav>
</body>
</html>
