<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4D Card Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 35%, #18204a 0%, #0b0d18 45%, #04050b 100%);
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .scene { perspective: 1400px; width: min(78vw, 500px); }
    .card-wrap { position: relative; width: 100%; aspect-ratio: 2 / 3; transform-style: preserve-3d; }
    .card { position: absolute; inset: 0; transform-style: preserve-3d; will-change: transform; }
    .layer {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
      pointer-events: none; user-select: none; transform-style: preserve-3d;
      will-change: transform, opacity;
    }
    .shadow {
      position: absolute; left: 10%; right: 10%; bottom: -4%; height: 9%; border-radius: 50%;
      background: rgba(0,0,0,0.5); filter: blur(25px); transform: translateZ(-30px); pointer-events: none;
    }
    .glow {
      position: absolute; inset: -8%;
      background: radial-gradient(circle, rgba(130,150,255,0.16), rgba(130,150,255,0) 60%);
      filter: blur(30px); transform: translateZ(-24px); pointer-events: none;
    }
    .holo { mix-blend-mode: screen; opacity: 0.34; }
    .fx-back { mix-blend-mode: screen; opacity: 0.18; }
    .player { }
    .fx-front { mix-blend-mode: screen; opacity: 0.42; }
    .ui { opacity: 0.98; }
    .gloss { mix-blend-mode: screen; opacity: 0.65; }
    .shine {
      position: absolute; inset: 0; pointer-events: none; border-radius: 18px;
      mix-blend-mode: screen; opacity: 0.75;
    }
    .hint { position: fixed; bottom: 16px; color: rgba(255,255,255,0.72); font-size: 13px; }
    #fourd-scene-data { display: none; }
  </style>
</head>
<body>
  <script type="application/json" id="fourd-scene-data">__FOURD_SCENE__</script>
  <div class="scene" id="scene">
    <div class="card-wrap">
      <div class="shadow"></div>
      <div class="glow"></div>
      <div class="card" id="card">
        <img class="layer bg" src="background.png" alt="" draggable="false" />
        <img class="layer holo" src="holo_overlay.png" alt="" draggable="false" />
        <img class="layer fx-back" src="fx_back.png" alt="" draggable="false" />
        <img class="layer player" src="player.png" alt="" draggable="false" />
        <img class="layer fx-front" src="fx_front.png" alt="" draggable="false" />
        <img class="layer ui" src="ui_overlay.png" alt="" draggable="false" />
        <img class="layer gloss" src="gloss_overlay.png" alt="" draggable="false" />
        <div class="shine" id="shine"></div>
      </div>
    </div>
  </div>
  <div class="hint">Move the pointer — each PNG layer parallaxes at its own depth (not the flat preview).</div>
  <script>
    const sceneData = document.getElementById("fourd-scene-data");
    const SCENE = JSON.parse(sceneData.textContent);
    const D = SCENE.depths;
    const PT = SCENE.parallax_translate;
    const V = SCENE.viewer || {};
    const tiltMax = V.tilt_max_deg != null ? V.tilt_max_deg : 10;
    const smooth = V.smooth != null ? V.smooth : 0.08;
    const shineOff = V.shine_gradient_offset != null ? V.shine_gradient_offset : 20;
    const glossZOff = V.gloss_z_offset != null ? V.gloss_z_offset : -2;

    const scene = document.getElementById("scene");
    const card = document.getElementById("card");
    const shine = document.getElementById("shine");
    const bg = document.querySelector(".bg");
    const holo = document.querySelector(".holo");
    const fxBack = document.querySelector(".fx-back");
    const player = document.querySelector(".player");
    const fxFront = document.querySelector(".fx-front");
    const ui = document.querySelector(".ui");
    const gloss = document.querySelector(".gloss");

    function tmul(key, axis) {
      const arr = PT[key] || [0, 0];
      return arr[axis] || 0;
    }

    let targetRX = 0, targetRY = 0, currentRX = 0, currentRY = 0;
    let targetPX = 0, targetPY = 0, currentPX = 0, currentPY = 0;

    function handleMove(clientX, clientY) {
      const rect = scene.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;
      const nx = (x - 0.5) * 2;
      const ny = (y - 0.5) * 2;
      targetRY = nx * tiltMax;
      targetRX = -ny * tiltMax;
      targetPX = nx;
      targetPY = ny;
      const shineX = 50 + nx * shineOff;
      const shineY = 50 + ny * shineOff;
      shine.style.background =
        `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.08) 14%, rgba(255,255,255,0.02) 26%, rgba(255,255,255,0.00) 44%)`;
    }

    window.addEventListener("mousemove", (e) => handleMove(e.clientX, e.clientY));
    window.addEventListener("touchmove", (e) => {
      const t = e.touches[0];
      if (t) handleMove(t.clientX, t.clientY);
    }, { passive: true });

    function animate() {
      currentRX += (targetRX - currentRX) * smooth;
      currentRY += (targetRY - currentRY) * smooth;
      currentPX += (targetPX - currentPX) * smooth;
      currentPY += (targetPY - currentPY) * smooth;
      card.style.transform = `rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;

      const px = currentPX, py = currentPY;
      bg.style.transform =
        `translateZ(${D.background}px) scale(1.01) translate(${px * tmul("background", 0)}px, ${py * tmul("background", 1)}px)`;
      holo.style.transform =
        `translateZ(${D.holo}px) scale(1.005) translate(${px * tmul("holo", 0)}px, ${py * tmul("holo", 1)}px)`;
      fxBack.style.transform =
        `translateZ(${D.fx_back}px) scale(1.005) translate(${px * tmul("fx_back", 0)}px, ${py * tmul("fx_back", 1)}px)`;
      player.style.transform =
        `translateZ(${D.player}px) scale(1.008) translate(${px * tmul("player", 0)}px, ${py * tmul("player", 1)}px)`;
      fxFront.style.transform =
        `translateZ(${D.fx_front}px) scale(1.01) translate(${px * tmul("fx_front", 0)}px, ${py * tmul("fx_front", 1)}px)`;
      ui.style.transform =
        `translateZ(${D.ui}px) translate(${px * tmul("ui", 0)}px, ${py * tmul("ui", 1)}px)`;
      gloss.style.transform =
        `translateZ(${D.shine + glossZOff}px) translate(${px * tmul("gloss", 0)}px, ${py * tmul("gloss", 1)}px)`;
      shine.style.transform = `translateZ(${D.shine}px)`;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
